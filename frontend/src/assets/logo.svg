<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hh-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="hh-inner" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <path d="M32 2 L58 17 L58 47 L32 62 L6 47 L6 17 Z" fill="url(#hh-grad)" stroke="none"/>
  <!-- Inner honeycomb pattern: 3 hexagonal cells -->
  <!-- Top cell -->
  <path d="M32 10 L40 14.6 L40 23.8 L32 28.4 L24 23.8 L24 14.6 Z" fill="url(#hh-inner)" opacity="0.35"/>
  <!-- Bottom-left cell -->
  <path d="M20 24.8 L28 29.4 L28 38.6 L20 43.2 L12 38.6 L12 29.4 Z" fill="url(#hh-inner)" opacity="0.25"/>
  <!-- Bottom-right cell -->
  <path d="M44 24.8 L52 29.4 L52 38.6 L44 43.2 L36 38.6 L36 29.4 Z" fill="url(#hh-inner)" opacity="0.25"/>
  <!-- Stylized HH monogram -->
  <g fill="#ffffff">
    <!-- Left H -->
    <rect x="19" y="20" width="3.5" height="24" rx="1.5"/>
    <rect x="29" y="20" width="3.5" height="24" rx="1.5"/>
    <rect x="19" y="29.5" width="13.5" height="3.5" rx="1.5"/>
    <!-- Right H (overlapping slightly for monogram feel) -->
    <rect x="32.5" y="20" width="3.5" height="24" rx="1.5"/>
    <rect x="42" y="20" width="3.5" height="24" rx="1.5"/>
    <rect x="32.5" y="29.5" width="13" height="3.5" rx="1.5"/>
  </g>
</svg>
