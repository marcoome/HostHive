<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#111128"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="og-hex" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="og-glow" x1="500" y1="200" x2="700" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="600" cy="280" rx="350" ry="250" fill="url(#og-glow)"/>
  <!-- Grid pattern for tech feel -->
  <g stroke="#6366f1" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Logo hexagon -->
  <g transform="translate(520, 160)">
    <path d="M80 5 L150 45 L150 125 L80 165 L10 125 L10 45 Z" fill="url(#og-hex)"/>
    <path d="M80 30 L110 47 L110 82 L80 99 L50 82 L50 47 Z" fill="#ffffff" opacity="0.15"/>
    <g fill="#ffffff">
      <rect x="47" y="50" width="5.5" height="65" rx="2.5"/>
      <rect x="72.5" y="50" width="5.5" height="65" rx="2.5"/>
      <rect x="47" y="74.5" width="31" height="5.5" rx="2.5"/>
      <rect x="78" y="50" width="5.5" height="65" rx="2.5"/>
      <rect x="103.5" y="50" width="5.5" height="65" rx="2.5"/>
      <rect x="78" y="74.5" width="31" height="5.5" rx="2.5"/>
    </g>
  </g>
  <!-- Text -->
  <text x="600" y="400" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">HostHive</text>
  <text x="600" y="445" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400">Modern Hosting Control Panel</text>
  <!-- Bottom accent line -->
  <rect x="530" y="470" width="140" height="3" rx="1.5" fill="url(#og-hex)" opacity="0.6"/>
</svg>
