<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        @media (prefers-color-scheme: light) {
            body { background: #f1f5f9; color: #1e293b; }
            .card { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.08); }
            .card h1 { color: #0f172a; }
            .card p { color: #64748b; }
            .code { color: #ef4444; }
            .btn { background: #ef4444; color: #fff; }
            .btn:hover { background: #dc2626; }
        }
        .bg-glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }
        .bg-glow-1 { top: -150px; left: -100px; background: #ef4444; }
        .bg-glow-2 { bottom: -200px; right: -100px; background: #f97316; }
        .card {
            position: relative;
            text-align: center;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 90%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            color: #f87171;
            margin-bottom: 0.5rem;
        }
        .card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .card p {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 0.625rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .btn:hover { background: #dc2626; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="card">
        <div class="code">500</div>
        <h1>Server Error</h1>
        <p>Something went wrong on our end. Our team has been notified and we are working to fix it. Please try again shortly.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
