# HostHive Default WAF Rules (Nginx naxsi-style)
# These rules detect common attack patterns.
# WAF starts in "detect" mode by default -- violations are logged, not blocked.
#
# Variables used:
#   $waf_block  -- set to "1" when a rule matches
#   $waf_mode   -- "detect" (log only) or "block" (return 403)

# ---------------------------------------------------------------------------
# WAF log format (must be defined in nginx.conf http block)
# ---------------------------------------------------------------------------
# log_format waf_log '$time_iso8601 $remote_addr $request_uri $waf_rule_matched';

# ---------------------------------------------------------------------------
# Initialise WAF block variable
# ---------------------------------------------------------------------------
set $waf_block 0;
set $waf_rule_matched "";

# ===================================================================
# 1. SQL Injection patterns
# ===================================================================

# Union-based injection
if ($args ~* "union\s+(all\s+)?select") {
    set $waf_block 1;
    set $waf_rule_matched "sqli-union-select";
}

# Stacked queries / comment-based injection
if ($args ~* "(;|\-\-|/\*).*(drop|alter|truncate|insert|update|delete)\s") {
    set $waf_block 1;
    set $waf_rule_matched "sqli-stacked-query";
}

# Common SQL keywords in query string
if ($args ~* "(select|insert|update|delete|drop|alter|create|truncate|exec|execute)\s.*\sfrom\s") {
    set $waf_block 1;
    set $waf_rule_matched "sqli-keyword";
}

# SQL injection via single quotes
if ($args ~* "('\s*(or|and)\s*'?\d*\s*[=<>])") {
    set $waf_block 1;
    set $waf_rule_matched "sqli-quote-logic";
}

# Hex-encoded SQL injection
if ($args ~* "0x[0-9a-f]{8,}") {
    set $waf_block 1;
    set $waf_rule_matched "sqli-hex-encoded";
}

# ===================================================================
# 2. Cross-Site Scripting (XSS) patterns
# ===================================================================

# Script tags
if ($args ~* "<script[^>]*>") {
    set $waf_block 1;
    set $waf_rule_matched "xss-script-tag";
}

# Event handlers (onerror, onload, onclick, etc.)
if ($args ~* "\bon\w+\s*=") {
    set $waf_block 1;
    set $waf_rule_matched "xss-event-handler";
}

# javascript: protocol
if ($args ~* "javascript\s*:") {
    set $waf_block 1;
    set $waf_rule_matched "xss-javascript-proto";
}

# data: URI with base64
if ($args ~* "data\s*:[^,]*;base64") {
    set $waf_block 1;
    set $waf_rule_matched "xss-data-uri";
}

# SVG onload
if ($args ~* "<svg[^>]*onload") {
    set $waf_block 1;
    set $waf_rule_matched "xss-svg-onload";
}

# Expression / vbscript
if ($args ~* "(expression|vbscript)\s*\(") {
    set $waf_block 1;
    set $waf_rule_matched "xss-expression";
}

# ===================================================================
# 3. Path Traversal patterns
# ===================================================================

# Directory traversal
if ($uri ~* "\.\./") {
    set $waf_block 1;
    set $waf_rule_matched "traversal-dotdot";
}

if ($args ~* "\.\./") {
    set $waf_block 1;
    set $waf_rule_matched "traversal-dotdot-args";
}

# Encoded traversal
if ($args ~* "(%2e%2e|%252e%252e|\.%2e|%2e\.)") {
    set $waf_block 1;
    set $waf_rule_matched "traversal-encoded";
}

# Null bytes
if ($args ~* "%00") {
    set $waf_block 1;
    set $waf_rule_matched "traversal-null-byte";
}

# Direct access to sensitive files
if ($uri ~* "(/(etc|proc|var/log)/(passwd|shadow|hosts)|\.htaccess|\.htpasswd|\.git|\.env|web\.config|wp-config\.php)") {
    set $waf_block 1;
    set $waf_rule_matched "traversal-sensitive-file";
}

# ===================================================================
# 4. Shell Injection / Command Injection patterns
# ===================================================================

# Command chaining
if ($args ~* "(;|\||&&)\s*(ls|cat|id|whoami|uname|curl|wget|nc|bash|sh|python|perl|ruby|php)") {
    set $waf_block 1;
    set $waf_rule_matched "cmdi-chaining";
}

# Backtick execution
if ($args ~* "`[^`]+`") {
    set $waf_block 1;
    set $waf_rule_matched "cmdi-backtick";
}

# $() subshell
if ($args ~* "\$\([^)]+\)") {
    set $waf_block 1;
    set $waf_rule_matched "cmdi-subshell";
}

# /bin/ or /usr/bin/ references
if ($args ~* "/(bin|usr/bin|usr/local/bin)/(bash|sh|cat|nc|curl|wget|python|perl|ruby|php)") {
    set $waf_block 1;
    set $waf_rule_matched "cmdi-binary-path";
}

# ===================================================================
# 5. File Upload restrictions
# ===================================================================

# Block executable upload extensions in URI
if ($uri ~* "\.(exe|bat|cmd|com|vbs|vbe|js|jse|wsf|wsh|ps1|pif|scr|cpl|msi|dll)$") {
    set $waf_block 1;
    set $waf_rule_matched "upload-executable";
}

# Block PHP files in upload directories
if ($uri ~* "/uploads?/.*\.ph(p[345s]?|tml)$") {
    set $waf_block 1;
    set $waf_rule_matched "upload-php-in-uploads";
}

# ===================================================================
# 6. Rate limiting per URL (requires limit_req_zone in http block)
# ===================================================================
# NOTE: Rate limiting zones must be defined in the http block:
#   limit_req_zone $binary_remote_addr zone=waf_login:10m rate=5r/s;
#   limit_req_zone $binary_remote_addr zone=waf_api:10m rate=30r/s;

# Login page rate limit
# limit_req zone=waf_login burst=10 nodelay;

# API rate limit
# limit_req zone=waf_api burst=50 nodelay;

# ===================================================================
# 7. Bot detection (bad user agents)
# ===================================================================

if ($http_user_agent ~* "(nikto|sqlmap|nmap|dirbuster|gobuster|masscan|wpscan|hydra|metasploit|burpsuite|havij|acunetix|nessus|openvas|w3af|arachni|skipfish|grabber|wget.*spider|curl.*bot)") {
    set $waf_block 1;
    set $waf_rule_matched "bot-scanner";
}

# Empty user agent
if ($http_user_agent = "") {
    set $waf_block 1;
    set $waf_rule_matched "bot-empty-ua";
}

# ===================================================================
# 8. Protocol enforcement
# ===================================================================

# Block non-standard HTTP methods
if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
    set $waf_block 1;
    set $waf_rule_matched "protocol-bad-method";
}

# Block requests with no Host header
if ($host = "") {
    set $waf_block 1;
    set $waf_rule_matched "protocol-no-host";
}

# ===================================================================
# 9. Country blocking (GeoIP2)
# ===================================================================
# Geo-blocking is managed via the HostHive panel:
#   API: /api/v1/waf/geo/rules
#   Config: /etc/nginx/conf.d/geo-block.conf (auto-generated)
#
# The geoip2 map sets $geo_blocked which is evaluated in vhost templates.
# Do NOT add manual geo rules here -- use the panel instead.
