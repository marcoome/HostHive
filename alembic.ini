[alembic]
script_location = alembic
# Connection string is overridden at runtime from api.core.config.settings.DATABASE_URL
# Replace asyncpg with psycopg2 for sync alembic operations
sqlalchemy.url = postgresql+psycopg2://hosthive:changeme@127.0.0.1:5432/hosthive

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
