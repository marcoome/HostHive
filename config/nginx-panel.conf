# ─────────────────────────────────────────────────────────────────────────────
# HostHive — Nginx Configuration
# Serves the Vue frontend and proxies API requests to uvicorn (port 8000).
# HTTPS on port 8443, HTTP redirect on port 8080.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name _;

    # ─── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate /etc/ssl/hosthive/panel.crt;
    ssl_certificate_key /etc/ssl/hosthive/panel.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss: ws:;" always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # ─── Hide server version ─────────────────────────────────────────────────
    server_tokens off;

    # ─── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/hosthive/nginx-access.log;
    error_log  /var/log/hosthive/nginx-error.log;

    # ─── Frontend static files (Vue build output) ────────────────────────────
    root /opt/hosthive/frontend/dist;
    index index.html;

    # ─── API proxy ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for live logs, terminal, etc.)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    300s;

        # Buffering
        proxy_buffering off;
    }

    # ─── Agent proxy (internal, restricted by IP) ────────────────────────────
    location /agent/ {
        allow 127.0.0.1;
        allow ::1;
        deny  all;

        proxy_pass         http://127.0.0.1:7080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket endpoint ──────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ─── Roundcube Webmail ──────────────────────────────────────────────────
    location /webmail/ {
        alias /usr/share/roundcube/;
        index index.php;

        location ~ \.php$ {
            fastcgi_split_path_info ^/webmail(/.+\.php)(/.*)$;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /usr/share/roundcube$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\. { deny all; }
        location ~ ^/webmail/(config|temp|logs)/ { deny all; }
    }

    # ─── phpMyAdmin ──────────────────────────────────────────────────────────
    location /phpmyadmin/ {
        alias /usr/share/phpmyadmin/;
        index index.php;

        location ~ \.php$ {
            fastcgi_split_path_info ^/phpmyadmin(/.+\.php)(/.*)$;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /usr/share/phpmyadmin$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\. { deny all; }
    }

    # ─── Vue SPA fallback — all other routes go to index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Deny dotfiles ───────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Request body limit (for file uploads via API) ───────────────────────
    client_max_body_size 256m;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}

# HTTP redirect to HTTPS
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    return 301 https://$host:8443$request_uri;
}
