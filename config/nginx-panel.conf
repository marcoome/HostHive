# ─────────────────────────────────────────────────────────────────────────────
# HostHive — Nginx Configuration
# Serves the Vue frontend and proxies API requests to uvicorn (port 8000).
# Listens on port 8083.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8083;
    listen [::]:8083;
    server_name _;

    # ─── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';" always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # ─── Hide server version ─────────────────────────────────────────────────
    server_tokens off;

    # ─── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/novapanel/nginx-access.log;
    error_log  /var/log/novapanel/nginx-error.log;

    # ─── Frontend static files (Vue build output) ────────────────────────────
    root /opt/novapanel/frontend/dist;
    index index.html;

    # ─── API proxy ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for live logs, terminal, etc.)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    300s;

        # Buffering
        proxy_buffering off;
    }

    # ─── Agent proxy (internal, restricted by IP) ────────────────────────────
    location /agent/ {
        # Only allow connections from localhost
        allow 127.0.0.1;
        allow ::1;
        deny  all;

        proxy_pass         http://127.0.0.1:7080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket endpoint ──────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ─── Vue SPA fallback — all other routes go to index.html ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Deny dotfiles ───────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Request body limit (for file uploads via API) ───────────────────────
    client_max_body_size 256m;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}
